version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: hiregen_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hiregen_network

  backend:
    build: ./backend
    container_name: hiregen_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/hiregen
      - JWT_SECRET=super_secret_jwt_key_here
      - JWT_EXPIRES_IN=7d
      - AI_SERVICE_URL=http://ai-service:8000
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    networks:
      - hiregen_network

  ai-service:
    build: ./ai-service
    container_name: hiregen_ai_service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    networks:
      - hiregen_network

  frontend:
    build: ./frontend
    container_name: hiregen_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hiregen_network

volumes:
  mongo_data:

networks:
  hiregen_network:
    driver: bridge
